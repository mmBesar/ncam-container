# .github/workflows/build-image.yml
#
# Builds and pushes a multi-arch NCam image to GHCR.
# Triggered by sync-upstream.yml via repository_dispatch, or manually.

name: Build & Push Image

on:
  repository_dispatch:
    types: [upstream-release]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Build amd64 natively on GitHub-hosted ubuntu runner
  # ─────────────────────────────────────────────────────────────────────────
  build-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout upstream branch (NCam source)
        uses: actions/checkout@v6
        with:
          ref: upstream

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          REPO=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "repo=${REPO}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Build & push amd64
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.repo }}:${{ steps.tags.outputs.sha_short }}-amd64
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64

  # ─────────────────────────────────────────────────────────────────────────
  # Build arm64 natively on GitHub-hosted arm64 runner (no QEMU)
  # ─────────────────────────────────────────────────────────────────────────
  build-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout upstream branch (NCam source)
        uses: actions/checkout@v6
        with:
          ref: upstream

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          REPO=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "repo=${REPO}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Build & push arm64
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.repo }}:${{ steps.tags.outputs.sha_short }}-arm64
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64

  # ─────────────────────────────────────────────────────────────────────────
  # Build riscv64 via RISE RISC-V Runners (native, no QEMU)
  # ─────────────────────────────────────────────────────────────────────────
  build-riscv64:
    runs-on: ubuntu-24.04-riscv
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout upstream branch (NCam source)
        uses: actions/checkout@v6
        with:
          ref: upstream

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          REPO=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "repo=${REPO}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Build & push riscv64
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/riscv64
          push: true
          tags: ${{ steps.tags.outputs.repo }}:${{ steps.tags.outputs.sha_short }}-riscv64
          cache-from: type=gha,scope=riscv64
          cache-to: type=gha,mode=max,scope=riscv64

  # ─────────────────────────────────────────────────────────────────────────
  # Merge arch images into a single multi-arch manifest
  # ─────────────────────────────────────────────────────────────────────────
  manifest:
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64, build-riscv64]
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout main branch (for built-tags.txt)
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve names
        id: names
        run: |
          REPO=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          # Get SHA from the upstream branch HEAD
          SHA_SHORT=$(git ls-remote origin refs/heads/upstream | cut -c1-7)
          echo "repo=${REPO}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Check built-tags ledger
        id: ledger
        run: |
          touch built-tags.txt
          SHA="${{ steps.names.outputs.sha_short }}"
          if grep -qx "${SHA}" built-tags.txt; then
            echo "already_built=true" >> "$GITHUB_OUTPUT"
            echo "SHA ${SHA} already in ledger — skipping."
          else
            echo "already_built=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push multi-arch manifest
        if: steps.ledger.outputs.already_built == 'false'
        run: |
          REPO="${{ steps.names.outputs.repo }}"
          SHA="${{ steps.names.outputs.sha_short }}"
          docker buildx imagetools create \
            --tag "${REPO}:${SHA}" \
            --tag "${REPO}:latest" \
            "${REPO}:${SHA}-amd64" \
            "${REPO}:${SHA}-arm64" \
            "${REPO}:${SHA}-riscv64"

      - name: Update built-tags ledger
        if: steps.ledger.outputs.already_built == 'false'
        run: |
          echo "${{ steps.names.outputs.sha_short }}" >> built-tags.txt
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add built-tags.txt
          git commit -m "chore: record built tag ${{ steps.names.outputs.sha_short }}"
          git push origin main
