# .github/workflows/build-image.yml
#
# Builds and pushes a multi-arch NCam image to GHCR.
# Triggered by sync-upstream.yml via repository_dispatch, or manually.
# Uses git tags as ledger to avoid rebuilding identical upstream+main combos.

name: Build & Push Image

on:
  repository_dispatch:
    types: [upstream-release]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      already_built: ${{ steps.check.outputs.already_built }}
      build_key: ${{ steps.check.outputs.build_key }}
      sha_short: ${{ steps.check.outputs.sha_short }}
      repo: ${{ steps.check.outputs.repo }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Resolve key and check git tag ledger
        id: check
        run: |
          REPO=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          UPSTREAM_SHA=$(git ls-remote origin refs/heads/upstream | cut -c1-7)
          MAIN_SHA=$(git rev-parse --short HEAD)
          BUILD_KEY="${UPSTREAM_SHA}-${MAIN_SHA}"
          echo "repo=${REPO}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${UPSTREAM_SHA}" >> "$GITHUB_OUTPUT"
          echo "build_key=${BUILD_KEY}" >> "$GITHUB_OUTPUT"
          if git ls-remote origin "refs/tags/built/${BUILD_KEY}" | grep -q .; then
            echo "already_built=true" >> "$GITHUB_OUTPUT"
            echo "Tag built/${BUILD_KEY} exists -- skipping."
          else
            echo "already_built=false" >> "$GITHUB_OUTPUT"
          fi

  build-amd64:
    needs: [check]
    if: needs.check.outputs.already_built == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout main (Dockerfile + entrypoint)
        uses: actions/checkout@v6
        with:
          ref: main
          path: main

      - name: Checkout upstream (NCam source) into src/
        uses: actions/checkout@v6
        with:
          ref: upstream
          path: src

      - name: Assemble build context
        run: |
          cp main/Dockerfile    src/Dockerfile
          cp main/entrypoint.sh src/entrypoint.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          REPO=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SHA_SHORT=$(cd src && git rev-parse --short HEAD)
          echo "repo=${REPO}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Build & push amd64
        uses: docker/build-push-action@v7
        with:
          context: src
          file: src/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.tags.outputs.repo }}:${{ steps.tags.outputs.sha_short }}-amd64
            ${{ steps.tags.outputs.repo }}:latest-amd64
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64

  build-arm64:
    needs: [check]
    if: needs.check.outputs.already_built == 'false'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout main (Dockerfile + entrypoint)
        uses: actions/checkout@v6
        with:
          ref: main
          path: main

      - name: Checkout upstream (NCam source) into src/
        uses: actions/checkout@v6
        with:
          ref: upstream
          path: src

      - name: Assemble build context
        run: |
          cp main/Dockerfile    src/Dockerfile
          cp main/entrypoint.sh src/entrypoint.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          REPO=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SHA_SHORT=$(cd src && git rev-parse --short HEAD)
          echo "repo=${REPO}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Build & push arm64
        uses: docker/build-push-action@v7
        with:
          context: src
          file: src/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.tags.outputs.repo }}:${{ steps.tags.outputs.sha_short }}-arm64
            ${{ steps.tags.outputs.repo }}:latest-arm64
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64

  build-riscv64:
    needs: [check]
    if: needs.check.outputs.already_built == 'false'
    runs-on: ubuntu-24.04-riscv
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout main (Dockerfile + entrypoint)
        uses: actions/checkout@v6
        with:
          ref: main
          path: main

      - name: Checkout upstream (NCam source) into src/
        uses: actions/checkout@v6
        with:
          ref: upstream
          path: src

      - name: Assemble build context
        run: |
          cp main/Dockerfile    src/Dockerfile
          cp main/entrypoint.sh src/entrypoint.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          REPO=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SHA_SHORT=$(cd src && git rev-parse --short HEAD)
          echo "repo=${REPO}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Build & push riscv64
        uses: docker/build-push-action@v7
        with:
          context: src
          file: src/Dockerfile
          platforms: linux/riscv64
          push: true
          tags: |
            ${{ steps.tags.outputs.repo }}:${{ steps.tags.outputs.sha_short }}-riscv64
            ${{ steps.tags.outputs.repo }}:latest-riscv64
          cache-from: type=gha,scope=riscv64
          cache-to: type=gha,mode=max,scope=riscv64

  manifest:
    runs-on: ubuntu-latest
    needs: [check, build-amd64, build-arm64, build-riscv64]
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout main (for tag push)
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          REPO="${{ needs.check.outputs.repo }}"
          SHA="${{ needs.check.outputs.sha_short }}"
          docker buildx imagetools create \
            --tag "${REPO}:${SHA}" \
            --tag "${REPO}:latest" \
            "${REPO}:${SHA}-amd64" \
            "${REPO}:${SHA}-arm64" \
            "${REPO}:${SHA}-riscv64"

      - name: Record build with git tag
        run: |
          git tag "built/${{ needs.check.outputs.build_key }}"
          git push origin "built/${{ needs.check.outputs.build_key }}"
